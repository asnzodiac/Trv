<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AIX SEC OPS - TRV Dashboard</title>
  <meta name="theme-color" content="#121212" id="themeColorMeta" />
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Light Mode Variables */
      --bg-color: #f0f2f5;
      --nav-bg: rgba(255, 255, 255, 0.9);
      --surface-color: #ffffff;
      --text-main: #111827;
      --text-muted: #6b7280;
      --border-color: #e5e7eb;
      
      --primary-color: #1f2937;
      --primary-hover: #374151;
      
      --table-header-bg: #2d3748;
      --table-header-text: #ffffff;
      
      /* Row Colors matching screenshot vibe */
      --row-normal-bg: #e6f4ea;
      --row-normal-text: #0d4d22;
      --row-delayed-bg: #fce8e6;
      --row-delayed-text: #a50e0e;
      --row-completed-bg: #f3f4f6;
      
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }

    [data-theme="dark"] {
      /* Dark Mode Variables */
      --bg-color: #0b0f19;
      --nav-bg: rgba(17, 24, 39, 0.9);
      --surface-color: #1f2937;
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
      --border-color: #374151;
      
      --primary-color: #3b82f6;
      --primary-hover: #60a5fa;
      
      --table-header-bg: #111827;
      --table-header-text: #e5e7eb;
      
      /* Dark Mode Row Colors */
      --row-normal-bg: rgba(16, 185, 129, 0.15);
      --row-normal-text: #6ee7b7;
      --row-delayed-bg: rgba(239, 68, 68, 0.2);
      --row-delayed-text: #fca5a5;
      --row-completed-bg: rgba(31, 41, 55, 0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      transition: background-color 0.3s ease, color 0.3s ease;
      line-height: 1.5;
      height: 100vh;
      overflow: hidden; /* Prevent full page scroll, rely on inner scrolls */
      display: flex;
      flex-direction: column;
    }

    /* Top Navigation Bar */
    .top-nav {
      background: var(--nav-bg);
      backdrop-filter: blur(10px);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      box-shadow: var(--shadow-sm);
      z-index: 100;
      flex-shrink: 0;
    }

    .nav-center {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .pill-title {
      background: var(--surface-color);
      border: 1px solid var(--border-color);
      padding: 8px 24px;
      border-radius: 24px;
      font-weight: 700;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: var(--shadow-sm);
    }

    button, .btn {
      padding: 8px 16px;
      background-color: var(--primary-color);
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    button:hover, .btn:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
    }

    .btn-outline {
      background-color: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-main);
    }

    .btn-outline:hover {
      background-color: var(--surface-color);
      color: var(--text-main);
    }

    #loadingIndicator {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-left: 10px;
    }

    /* Dashboard Layout */
    .dashboard-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 16px;
      flex-grow: 1;
      overflow: hidden; /* Keeps grids constrained */
    }

    .board {
      background: var(--surface-color);
      border-radius: 12px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .board-header {
      background: var(--table-header-bg);
      color: var(--table-header-text);
      padding: 12px;
      text-align: center;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-bottom: 2px solid var(--primary-color);
    }

    /* Table Container */
    .table-wrapper {
      flex-grow: 1;
      overflow-y: auto;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: center;
      white-space: nowrap;
    }

    th, td {
      padding: 12px 10px;
      border: 1px solid rgba(128, 128, 128, 0.2);
      font-size: 0.85rem;
    }

    th {
      background-color: var(--table-header-bg);
      color: var(--table-header-text);
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 10;
      font-size: 0.75rem;
      letter-spacing: 0.5px;
    }

    /* Row Coloring */
    .ontime-row {
      background-color: var(--row-normal-bg);
      color: var(--row-normal-text);
    }

    .delayed-row {
      background-color: var(--row-delayed-bg);
      color: var(--row-delayed-text);
    }

    .completed-row {
      background-color: var(--row-completed-bg);
      color: var(--text-muted);
      opacity: 0.8;
    }

    tbody tr:hover {
      filter: brightness(0.95);
    }
    
    [data-theme="dark"] tbody tr:hover {
      filter: brightness(1.2);
    }

    /* Flight Specifics */
    .flight-cell {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      font-weight: 700;
      padding-left: 10px;
    }

    .flight-logo {
      height: 18px;
      width: auto;
      object-fit: contain;
    }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    [data-theme="dark"] ::-webkit-scrollbar-thumb { background: #4b5563; }

    /* Responsive */
    @media (max-width: 1100px) {
      body {
        overflow-y: auto; /* Allow full page scroll on small screens */
      }
      .dashboard-container {
        grid-template-columns: 1fr; /* Stack columns */
        height: auto;
        overflow: visible;
      }
      .board {
        height: 600px; /* Fixed height for stacked boards */
      }
      .pill-title {
        display: none; /* Hide on mobile to save space */
      }
    }
  </style>
</head>
<body>

  <header class="top-nav">
    <div>
      <button id="loadEarlierBtn">Load Earlier Flights</button>
      <span id="loadingIndicator" style="display: none;">Loading...</span>
    </div>
    
    <div class="nav-center">
      <div class="pill-title">
        ✈ TRV FLIGHTS 🛫
      </div>
    </div>

    <div style="display: flex; gap: 10px;">
      <a href="indexpc.html" class="btn btn-outline" target="_blank">Advanced (PC)</a>
      <button id="themeToggle" class="btn-outline">Toggle Theme</button>
    </div>
  </header>

  <div class="dashboard-container">
    
    <div class="board">
      <div class="board-header">ARRIVALS – TRV</div>
      <div class="table-wrapper">
        <table id="arrivals-table">
          <thead>
            <tr>
              <th style="text-align: left; padding-left: 20px;">FLIGHT</th>
              <th>REG</th>
              <th>FROM</th>
              <th>ETA</th>
              <th>STA</th>
              <th>AIRCRAFT</th>
              <th>STATUS</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="board">
      <div class="board-header">DEPARTURES – TRV</div>
      <div class="table-wrapper">
        <table id="departures-table">
          <thead>
            <tr>
              <th style="text-align: left; padding-left: 20px;">FLIGHT</th>
              <th>REG</th>
              <th>TO</th>
              <th>ETD</th>
              <th>STD</th>
              <th>AIRCRAFT</th>
              <th>STATUS</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    const baseUrl = "https://api.flightradar24.com/common/v1/airport.json?code=trv";
    
    let historicalFlights = {
      arrivals: new Set(),
      departures: new Set()
    };
    
    let currentTimestamp = Math.floor(Date.now() / 1000);

    const getEndpoint = (type, page = 1, timestamp = null) => {
      const ts = timestamp || Math.floor(Date.now() / 1000);
      return `${baseUrl}&plugin-setting[schedule][mode]=${type}&plugin-setting[schedule][timestamp]=${ts}&page=${page}&limit=100`;
    };

    const toLocalTime = ts => {
      if (!ts) return "-";
      return new Date(ts * 1000).toLocaleTimeString('en-IN', {
        timeZone: 'Asia/Kolkata',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      });
    };

    const getLogoURL = (flightNumber) => {
      if (flightNumber.startsWith("IX")) {
        return "https://cdn.brandfetch.io/idM6IAvrlf/w/820/h/248/theme/dark/logo.png?c=1dxbfHSJFAPEGdCLU4o5B";
      } else if (flightNumber.startsWith("UL")) {
        return "https://cdn.flightradar24.com/assets/airlines/logotypes/66.png";
      }
      return "";
    };

    const filterAndSortFlights = (flights, type, isHistorical = false) => {
      const now = Math.floor(Date.now() / 1000);
      const oneHourInSeconds = 3600;

      return flights.filter(f => {
        const fn = f.flight?.identification?.number?.default || "";
        const est = type === "departures" ? f.flight.time.estimated?.departure : f.flight.time.estimated?.arrival;
        const sch = type === "departures" ? f.flight.time.scheduled?.departure : f.flight.time.scheduled?.arrival;
        const act = type === "departures" ? f.flight.time.actual?.departure : f.flight.time.actual?.arrival;

        const airlineMatch = fn.startsWith("IX") || fn.startsWith("UL");

        if (isHistorical) {
          const flightTime = sch || est || now;
          const twentyFourHoursAgo = now - (24 * 60 * 60);
          return airlineMatch && (flightTime >= twentyFourHoursAgo);
        }

        const flightTime = sch || est || now;
        const hoursAhead = 20;
        const twentyHoursFromNow = now + (hoursAhead * 60 * 60);
        const isWithinTimeWindow = flightTime >= now - oneHourInSeconds && flightTime <= twentyHoursFromNow;
        
        if (airlineMatch && isWithinTimeWindow) {
          if (!act && (est > now || sch > now)) return true;
          if (!act && sch < now && est > now) return true;
          if (act && act > now - oneHourInSeconds) return true;
        }
        return false;
      }).sort((a, b) => {
        // Automatically sort by Scheduled Time (STA/STD)
        const isDep = type === "departures";
        const aSch = isDep ? a.flight.time.scheduled?.departure : a.flight.time.scheduled?.arrival;
        const aEst = isDep ? a.flight.time.estimated?.departure : a.flight.time.estimated?.arrival;
        
        const bSch = isDep ? b.flight.time.scheduled?.departure : b.flight.time.scheduled?.arrival;
        const bEst = isDep ? b.flight.time.estimated?.departure : b.flight.time.estimated?.arrival;

        return (aSch || aEst || 0) - (bSch || bEst || 0);
      });
    };

    const loadFlights = async (type, page = 1, timestamp = null, append = false) => {
      try {
        const res = await fetch(getEndpoint(type, page, timestamp));
        const data = await res.json();
        const flights = data.result.response.airport.pluginData.schedule[type].data;
        const tbody = document.querySelector(`#${type}-table tbody`);
        
        if (!append) {
          tbody.innerHTML = "";
          historicalFlights[type].clear();
        }

        const filteredFlights = filterAndSortFlights(flights, type, append);
        const now = Math.floor(Date.now() / 1000);
        const newRows = [];
        
        filteredFlights.forEach(f => {
          const fl = f.flight;
          const flightId = fl.identification?.id;
          
          if (flightId && historicalFlights[type].has(flightId)) return;
          if (flightId) historicalFlights[type].add(flightId);
          
          const isDep = type === "departures";
          const est = isDep ? fl.time.estimated?.departure : fl.time.estimated?.arrival;
          const sch = isDep ? fl.time.scheduled?.departure : fl.time.scheduled?.arrival;
          const act = isDep ? fl.time.actual?.departure : fl.time.actual?.arrival;
          const fn = fl.identification.number?.default || "-";
          const logo = getLogoURL(fn);
          const reg = fl.aircraft?.registration || "-";
          const airportCode = isDep ? fl.airport.destination?.code?.iata : fl.airport.origin?.code?.iata || "-";
          const model = fl.aircraft?.model?.text || "-";
          const statusText = fl.status?.text || "Scheduled";
          
          const isDelayed = sch && now > sch && (!act || act > now) && (!est || est > now);
          const isCompleted = act && act <= now;
          
          const row = document.createElement("tr");
          
          // Apply row coloring classes based on screenshot style
          if (isDelayed) {
            row.classList.add("delayed-row");
          } else if (isCompleted) {
            row.classList.add("completed-row");
          } else {
            row.classList.add("ontime-row"); // Default green row
          }
          
          row.innerHTML = `
            <td>
              <div class="flight-cell">
                ${logo ? `<img class="flight-logo" src="${logo}" alt="logo">` : ''}
                ${fn}
              </div>
            </td>
            <td>${reg}</td>
            <td>${airportCode}</td>
            <td>${toLocalTime(est)}</td>
            <td>${toLocalTime(sch)}</td>
            <td>${model}</td>
            <td>${statusText}</td>
          `;
          
          newRows.push({ row, time: sch || est || 0 });
        });
        
        if (append && newRows.length > 0) {
          const existingRows = Array.from(tbody.querySelectorAll('tr'));
          const allRows = [...newRows.map(item => item.row), ...existingRows];
          
          const rowsWithTime = allRows.map(row => {
            const cells = row.querySelectorAll('td');
            const staTime = cells[4]?.textContent?.trim(); // Index 4 is STA/STD
            let timeValue = 0;
            if (staTime && staTime !== '-') {
              const [hours, minutes] = staTime.split(':').map(Number);
              timeValue = hours * 60 + minutes;
            }
            return { row, time: timeValue };
          });
          
          rowsWithTime.sort((a, b) => a.time - b.time);
          tbody.innerHTML = '';
          rowsWithTime.forEach(item => tbody.appendChild(item.row));
        } else {
          newRows.forEach(item => tbody.appendChild(item.row));
        }
      } catch (err) {
        console.error(`Error loading ${type}:`, err);
      }
    };

    const refreshAllFlights = () => {
      historicalFlights.arrivals.clear();
      historicalFlights.departures.clear();
      currentTimestamp = Math.floor(Date.now() / 1000);
      loadFlights("arrivals");
      loadFlights("departures");
    };

    const loadEarlierFlights = async () => {
      const loadingIndicator = document.getElementById("loadingIndicator");
      const loadEarlierBtn = document.getElementById("loadEarlierBtn");
      
      try {
        loadingIndicator.style.display = "inline";
        loadEarlierBtn.disabled = true;
        
        await Promise.all([
          loadFlights("arrivals", -1, currentTimestamp, true),
          loadFlights("departures", -1, currentTimestamp, true)
        ]);
        
        currentTimestamp -= (6 * 60 * 60); 
      } catch (error) {
        console.error("Error loading earlier flights:", error);
      } finally {
        loadingIndicator.style.display = "none";
        loadEarlierBtn.disabled = false;
      }
    };

    const themeToggle = document.getElementById("themeToggle");
    const metaThemeColor = document.getElementById("themeColorMeta");
    
    const setTheme = (theme) => {
      document.documentElement.setAttribute("data-theme", theme);
      metaThemeColor.setAttribute("content", theme === "dark" ? "#0b0f19" : "#f0f2f5");
      if (typeof Storage !== "undefined") {
        localStorage.setItem("theme", theme);
      }
    };

    const initializeTheme = () => {
      let savedTheme = "light";
      if (typeof Storage !== "undefined") {
        savedTheme = localStorage.getItem("theme") || "light";
      }
      setTheme(savedTheme);
    };

    themeToggle.addEventListener("click", () => {
      const currentTheme = document.documentElement.getAttribute("data-theme") || "light";
      setTheme(currentTheme === "dark" ? "light" : "dark");
    });

    document.getElementById("loadEarlierBtn").addEventListener("click", loadEarlierFlights);

    initializeTheme();
    refreshAllFlights();
    setInterval(refreshAllFlights, 30000);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .catch(err => console.error("SW registration failed:", err));
      });
    }
  </script>

</body>
</html>
